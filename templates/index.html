<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Motorcycle Collection</title>
</head>
<body>

  <header>
    <h1>Motorcycle Collection</h1>
    <p>Een overzicht van verschillende motoren</p>
  </header>

  <section class="motorcycles">
    <h2>Motorcycles</h2>
    <ul>
      {% for m in motorcycles %}
        <li>
          <a href="/motorcycles/{{ m.id }}">
            <strong>{{ m.brand }} {{ m.name }}</strong>
          </a>
          - {{ m.type }} ({{ m.cc }}cc)
        </li>
      {% endfor %}
    </ul>
  </section>

  <section class="brands">
    <h2>Brands</h2>
    <ul>
      {% for b in brands %}
        <li><strong>{{ b.name }}</strong> - {{ b.country }}</li>
      {% endfor %}
    </ul>
  </section>

</body>
</html>
